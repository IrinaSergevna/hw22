{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
    <h1 class="text-center">{% if object %}Редактировать{% else %}Создать{% endif %} статью</h1>
    <div class="row justify-content-center">
        <div class="col-md-6">
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="text-center">
                    <button type="submit" class="btn btn-primary">Сохранить</button>
                    <a href="{% url 'blog:blog_list' %}" class="btn btn-secondary">Отмена</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
