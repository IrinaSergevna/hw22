{% extends "base.html" %}
{% block content %}
<div class="container">
    <h1 class="pricing-header px-3 py-3 pt-md-5 pb-md-4 mx-auto text-center">Блог</h1>
    <div class="text-center mb-4">
        <a href="{% url 'blog:blog_create' %}" class="btn btn-success">Добавить статью</a>
    </div>
    <div class="row">
        {% for post in posts %}
        <div class="col-md-4 mb-4">
            <div class="card">
                {% if post.preview %}
                <img src="{{ post.preview.url }}" class="card-img-top" alt="{{ post.title }}">
                {% else %}
                <img src="https://via.placeholder.com/150" class="card-img-top" alt="Нет изображения">
                {% endif %}
                <div class="card-body">
                    <h5 class="card-title">{{ post.title }}</h5>
                    <p class="card-text">{{ post.content|truncatechars:100 }}</p>
                    <a href="{% url 'blog:blog_detail' post.pk %}" class="btn btn-primary">Подробнее</a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
