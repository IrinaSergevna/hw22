{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-warning text-white">
                    <h1 class="h4 mb-0">Отменить публикацию</h1>
                </div>
                <div class="card-body">
                    <p>Вы уверены, что хотите отменить публикацию продукта "{{ object.name }}"?</p>
                    <form method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-warning">Отменить публикацию</button>
                        <a href="{% url 'catalog:home' %}" class="btn btn-secondary">Отмена</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
