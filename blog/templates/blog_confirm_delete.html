{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
    <h1 class="text-center">Удалить "{{ object.title }}"?</h1>
    <div class="row justify-content-center">
        <div class="col-md-6">
            <form method="post">
                {% csrf_token %}
                <div class="text-center">
                    <button type="submit" class="btn btn-danger">Да</button>
                    <a href="{% url 'blog:blog_list' %}" class="btn btn-secondary">Нет</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
